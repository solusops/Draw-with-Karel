<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>
        
        <!-- Subtle Drop Shadow -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="4" dy="6" stdDeviation="6" flood-opacity="0.4" />
        </filter>
        
        <!-- Loop Highlight Gradient -->
        <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fef08a" />
            <stop offset="100%" stop-color="#facc15" />
        </linearGradient>
    </defs>

    <!-- Background square -->
    <rect width="512" height="512" fill="url(#bgGradient)" />
    
    <!-- Grid Lines -->
    <g stroke="#334155" stroke-width="3" opacity="0.6">
        <!-- Vertical -->
        <line x1="128" y1="0" x2="128" y2="512" />
        <line x1="256" y1="0" x2="256" y2="512" />
        <line x1="384" y1="0" x2="384" y2="512" />
        <!-- Horizontal -->
        <line x1="0" y1="128" x2="512" y2="128" />
        <line x1="0" y1="256" x2="512" y2="256" />
        <line x1="0" y1="384" x2="512" y2="384" />
    </g>

    <!-- The 2x2 Loop Highlight Pathway (Sharp Squares) -->
    <!-- We offset the boxes slightly from the grid lines to make them look like padded tiles -->
    <rect x="132" y="132" width="120" height="120" fill="url(#highlightGrad)" filter="url(#shadow)" />
    <rect x="260" y="132" width="120" height="120" fill="url(#highlightGrad)" filter="url(#shadow)" />
    <rect x="260" y="260" width="120" height="120" fill="url(#highlightGrad)" filter="url(#shadow)" />
    <rect x="132" y="260" width="120" height="120" fill="url(#highlightGrad)" filter="url(#shadow)" />

    <!-- Classic Karel Triangles forming a loop -->
    <!-- Top-Left Karel (facing East/Right) -->
    <g transform="translate(192, 192)" filter="url(#shadow)">
        <polygon points="-38,-38 -38,38 38,0" fill="#ef4444" stroke="#ffffff" stroke-width="6" />
    </g>

    <!-- Top-Right Karel (facing South/Down) -->
    <g transform="translate(320, 192)" filter="url(#shadow)">
        <polygon points="-38,-38 38,-38 0,38" fill="#3b82f6" stroke="#ffffff" stroke-width="6" />
    </g>

    <!-- Bottom-Right Karel (facing West/Left) -->
    <g transform="translate(320, 320)" filter="url(#shadow)">
        <polygon points="38,-38 38,38 -38,0" fill="#10b981" stroke="#ffffff" stroke-width="6" />
    </g>

    <!-- Bottom-Left Karel (facing North/Up) -->
    <g transform="translate(192, 320)" filter="url(#shadow)">
        <polygon points="-38,38 38,38 0,-38" fill="#a855f7" stroke="#ffffff" stroke-width="6" />
    </g>
</svg>
