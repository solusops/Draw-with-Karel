<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fef08a" />
            <stop offset="100%" stop-color="#facc15" />
        </linearGradient>
    </defs>

    <!-- Background white square with black border -->
    <rect x="2" y="2" width="508" height="508" fill="#FFFFFF" stroke="#000000" stroke-width="4" />
    
    <!-- Grid Lines (Black) -->
    <g stroke="#000000" stroke-width="4">
        <line x1="128" y1="0" x2="128" y2="512" />
        <line x1="256" y1="0" x2="256" y2="512" />
        <line x1="384" y1="0" x2="384" y2="512" />
        <line x1="0" y1="128" x2="512" y2="128" />
        <line x1="0" y1="256" x2="512" y2="256" />
        <line x1="0" y1="384" x2="512" y2="384" />
    </g>

    <!-- The 2x2 Loop Highlight Pathway (Sharp Squares) -->
    <rect x="132" y="132" width="120" height="120" fill="url(#highlightGrad)" />
    <rect x="260" y="132" width="120" height="120" fill="url(#highlightGrad)" />
    <rect x="260" y="260" width="120" height="120" fill="url(#highlightGrad)" />
    <rect x="132" y="260" width="120" height="120" fill="url(#highlightGrad)" />

    <!-- Classic Karels forming a loop -->
    <!-- Top-Left Karel (facing East/Right) -->
    <g transform="translate(192, 192) rotate(0)">
        <polyline points="-32,10 -45,10 -45,23" fill="none" stroke="#000000" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square" />
        <polyline points="10,45 10,58 23,58" fill="none" stroke="#000000" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square" />
        <polygon points="-32,-45 13,-45 32,-26 32,45 -13,45 -32,26" fill="#ef4444" stroke="#000000" stroke-width="6" stroke-linejoin="miter" />
        <polygon points="-15,-28 15,-28 15,10 -15,10" fill="#FFFFFF" stroke="#000000" stroke-width="4" stroke-linejoin="miter" />
        <line x1="-8" y1="23" x2="8" y2="23" stroke="#000000" stroke-width="4" stroke-linecap="square" />
    </g>

    <!-- Top-Right Karel (facing South/Down) -->
    <g transform="translate(320, 192) rotate(90)">
        <polyline points="-32,10 -45,10 -45,23" fill="none" stroke="#000000" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square" />
        <polyline points="10,45 10,58 23,58" fill="none" stroke="#000000" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square" />
        <polygon points="-32,-45 13,-45 32,-26 32,45 -13,45 -32,26" fill="#3b82f6" stroke="#000000" stroke-width="6" stroke-linejoin="miter" />
        <polygon points="-15,-28 15,-28 15,10 -15,10" fill="#FFFFFF" stroke="#000000" stroke-width="4" stroke-linejoin="miter" />
        <line x1="-8" y1="23" x2="8" y2="23" stroke="#000000" stroke-width="4" stroke-linecap="square" />
    </g>

    <!-- Bottom-Right Karel (facing West/Left) -->
    <g transform="translate(320, 320) rotate(180)">
        <polyline points="-32,10 -45,10 -45,23" fill="none" stroke="#000000" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square" />
        <polyline points="10,45 10,58 23,58" fill="none" stroke="#000000" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square" />
        <polygon points="-32,-45 13,-45 32,-26 32,45 -13,45 -32,26" fill="#10b981" stroke="#000000" stroke-width="6" stroke-linejoin="miter" />
        <polygon points="-15,-28 15,-28 15,10 -15,10" fill="#FFFFFF" stroke="#000000" stroke-width="4" stroke-linejoin="miter" />
        <line x1="-8" y1="23" x2="8" y2="23" stroke="#000000" stroke-width="4" stroke-linecap="square" />
    </g>

    <!-- Bottom-Left Karel (facing North/Up) -->
    <g transform="translate(192, 320) rotate(270)">
        <polyline points="-32,10 -45,10 -45,23" fill="none" stroke="#000000" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square" />
        <polyline points="10,45 10,58 23,58" fill="none" stroke="#000000" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square" />
        <polygon points="-32,-45 13,-45 32,-26 32,45 -13,45 -32,26" fill="#a855f7" stroke="#000000" stroke-width="6" stroke-linejoin="miter" />
        <polygon points="-15,-28 15,-28 15,10 -15,10" fill="#FFFFFF" stroke="#000000" stroke-width="4" stroke-linejoin="miter" />
        <line x1="-8" y1="23" x2="8" y2="23" stroke="#000000" stroke-width="4" stroke-linecap="square" />
    </g>

</svg>
